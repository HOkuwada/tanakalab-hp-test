<!-- ===== スライダー動作スクリプト ===== -->
<script>
(function(){
  var slider = document.getElementById('heroSlider');
  if (!slider) return;
  var slides = slider.querySelector('.hero-slides');
  var dotsBox = slider.querySelector('.hero-dots');
  var prev = slider.querySelector('.hero-prev');
  var next = slider.querySelector('.hero-next');
  var total = slides.children.length;
  var current = 0;
  var timer = null;
  var DURATION = 4500;

  // ドット生成
  for (var i = 0; i < total; i++) {
    var dot = document.createElement('button');
    dot.className = 'hero-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', (i + 1) + '枚目');
    dot.setAttribute('data-index', i);
    dot.addEventListener('click', function() {
      go(parseInt(this.getAttribute('data-index'), 10));
      restart();
    });
    dotsBox.appendChild(dot);
  }
  var dots = dotsBox.querySelectorAll('.hero-dot');

  function go(n) {
    current = (n + total) % total;
    slides.style.transform = 'translateX(-' + (current * 100) + '%)';
    for (var j = 0; j < dots.length; j++) {
      if (j === current) dots[j].classList.add('active');
      else dots[j].classList.remove('active');
    }
  }
  function start() { timer = setInterval(function(){ go(current + 1); }, DURATION); }
  function stop()  { if (timer) { clearInterval(timer); timer = null; } }
  function restart() { stop(); start(); }

  prev.addEventListener('click', function(){ go(current - 1); restart(); });
  next.addEventListener('click', function(){ go(current + 1); restart(); });
  slider.addEventListener('mouseenter', stop);
  slider.addEventListener('mouseleave', start);

  start();
})();
</script>

<!-- ===== 共通パーツ(ヘッダー・ナビ・フッター) ===== -->
<script src="common.js"></script>
<script>initPage("index.html");</script>
